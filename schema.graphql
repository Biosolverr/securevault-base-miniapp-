type Deposit @entity {
  id: ID!
  sender: Bytes!
  amount: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type Refund @entity {
  id: ID!
  recipient: Bytes!
  amount: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type StateChange @entity {
  id: ID!
  from: Int!
  to: Int!
  block: BigInt!
  txHash: Bytes!
}
